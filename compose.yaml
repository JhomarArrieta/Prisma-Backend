# Use postgres/example user/password credentials
# docker compose up -d
# docker bild -t image .

services:

  db:
    image: postgres
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    volumes:
     - ./resources/:/docker-entrypoint-initdb.d
      
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_DB : appdb
      POSTGRES_USER : admin 
      DB_USER: app_user
      DB_PASSWORD: myapppawd
      DB_NAME: appdb
    ports: 
      - 5434:5432

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  my-app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      - DB_PASSWORD=myapppawd
      - DB_USER=app_user
      - DB_HOST=db
      - DB_NAME=appdb
      - DB_PORT=5432
